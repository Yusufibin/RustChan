<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin - RustChan{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .admin-nav { display: flex; gap: 1rem; padding: 1rem; background: #333; }
        .admin-nav a { color: #fff; }
        .admin-nav a:hover { color: #ff6600; }
        .admin-panel { padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }
        .stat-card { background: #222; padding: 1.5rem; border-radius: 4px; text-align: center; }
        .stat-card h3 { margin: 0 0 0.5rem 0; color: #888; }
        .stat-card .value { font-size: 2rem; color: #ff6600; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #333; }
        th { background: #222; }
        .btn { padding: 0.5rem 1rem; background: #ff6600; color: #fff; border: none; cursor: pointer; }
        .btn-danger { background: #cc0000; }
        .btn-small { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
        form { display: inline; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.5rem; background: #222; border: 1px solid #444; color: #fff; }
        .pagination { display: flex; gap: 0.5rem; justify-content: center; margin: 1rem 0; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1><a href="/">RustChan</a></h1>
            <nav>
                <a href="/">Boards</a>
                <a href="/admin/dashboard">Admin</a>
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>RustChan // Anonymous Imageboard</p>
    </footer>
</body>
</html>
