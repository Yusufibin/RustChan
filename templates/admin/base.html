<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin — RustChan{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="site-title">
                <h1><a href="/">RustChan</a></h1>
            </div>
            <nav aria-label="Main navigation">
                <a href="/">← Boards</a>
                <a href="/admin/dashboard" class="nav-admin">Admin</a>
            </nav>
        </div>
    </header>

    <main>
        {% if flash %}
        <div class="flash flash-{{ flash.kind }}" role="alert">{{ flash.message }}</div>
        {% endif %}

        <div class="admin-layout">
            <!-- Sidebar -->
            <aside class="admin-sidebar" aria-label="Admin navigation">
                <div class="admin-sidebar-title">Admin Panel</div>
                <nav>
                    <a href="/admin/dashboard"
                       {% block nav_dashboard %}{% endblock %}>
                        Dashboard
                    </a>
                    <a href="/admin/boards"
                       {% block nav_boards %}{% endblock %}>
                        Boards
                    </a>
                    <a href="/admin/posts"
                       {% block nav_posts %}{% endblock %}>
                        Posts
                    </a>
                    <a href="/logout">Logout</a>
                </nav>
            </aside>

            <!-- Content -->
            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

    <footer>
        <p>RustChan // Anonymous Imageboard</p>
    </footer>
</body>
</html>
