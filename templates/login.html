<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RustChan Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-container { max-width: 400px; margin: 4rem auto; padding: 2rem; background: #222; border-radius: 4px; }
        .login-container h2 { text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input { width: 100%; padding: 0.75rem; background: #111; border: 1px solid #444; color: #fff; font-family: inherit; box-sizing: border-box; }
        .btn { width: 100%; padding: 0.75rem; background: #ff6600; color: #fff; border: none; cursor: pointer; font-family: inherit; }
        .btn:hover { background: #ff8533; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1><a href="/">RustChan</a></h1>
        </div>
    </header>
    <main>
        <div class="login-container">
            <h2>Admin Login</h2>
            <form method="post" action="/login" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autofocus>
                </div>
                <button type="submit" class="btn">Login</button>
            </form>
        </div>
    </main>
</body>
</html>
